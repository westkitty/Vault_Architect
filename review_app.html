<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Dual-Role Formatter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: { 850: '#151f32', 900: '#0f172a', 950: '#020617' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #020617; color: #e2e8f0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid #1e293b; }
        .markdown-preview table { border-collapse: collapse; width: 100%; margin: 1rem 0; font-size: 0.85rem; }
        .markdown-preview th, .markdown-preview td { border: 1px solid #334155; padding: 8px; text-align: left; }
        .markdown-preview th { background: #1e293b; color: #f1f5f9; }
    </style>
</head>
<body class="h-screen flex flex-col font-sans overflow-hidden antialiased text-slate-200">

    <header class="glass-panel shrink-0 px-6 py-4 flex items-center justify-between border-b border-slate-800 z-20">
        <div class="flex items-center gap-3">
            <i data-lucide="shield-check" class="text-indigo-500 w-7 h-7"></i>
            <div>
                <h1 class="text-lg font-bold tracking-tight leading-none text-slate-100">Dual-Role Vault Architect</h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Obsidian + NotebookLM Optimized</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="bg-slate-900 px-4 py-2 rounded-lg border border-slate-800 flex items-center gap-3">
                <div class="flex flex-col items-end">
                    <span class="text-[9px] text-slate-500 uppercase font-bold">Processed Entities</span>
                    <span id="doc-count" class="text-indigo-400 font-mono text-xl leading-none">0</span>
                </div>
                <i data-lucide="database" class="w-5 h-5 text-slate-600"></i>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <section class="w-1/2 lg:w-5/12 flex flex-col border-r border-slate-800 bg-slate-900/40">
            <div class="p-4 border-b border-slate-800 space-y-2 bg-slate-900/60">
                <label class="text-[11px] font-black text-indigo-400 uppercase tracking-[0.2em]">Data Injection Portal</label>
                <p class="text-xs text-slate-400 leading-relaxed">
                    Batch intake recognizes <code class="text-indigo-300 bg-slate-800 px-1 rounded">////</code> as document boundaries. The engine applies <strong>System Brief</strong> callouts for LLM indexing.
                </p>
            </div>

            <div class="flex-1 p-4 relative bg-slate-950">
                <textarea id="intake-textarea"
                    class="w-full h-full bg-transparent text-slate-300 font-mono text-sm resize-none focus:outline-none placeholder:text-slate-800 leading-relaxed"
                    placeholder="Enter document text...&#10;&#10;////&#10;&#10;Second document..."></textarea>
            </div>

            <div class="p-4 border-t border-slate-800 bg-slate-900 flex gap-3 shadow-2xl">
                <input type="file" id="file-upload" class="hidden" accept=".txt,.md,.json" multiple>
                <button id="upload-btn" class="flex-1 py-3 px-4 bg-slate-800 hover:bg-slate-700 text-slate-200 font-bold rounded-lg border border-slate-700 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="file-up" class="w-4 h-4"></i>
                    <span>Load Files</span>
                </button>
                <button id="process-btn" class="flex-[2] py-3 px-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-lg shadow-lg shadow-indigo-900/40 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="zap" class="w-4 h-4"></i>
                    <span>Format Batch</span>
                </button>
            </div>
        </section>

        <section class="w-1/2 lg:w-7/12 flex flex-col bg-slate-850">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/90">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest">Entity Ledger</h2>
                <div id="export-actions" class="flex items-center gap-3 hidden">
                    <button id="export-zip-btn" class="text-xs font-bold text-indigo-400 hover:text-indigo-300 flex items-center gap-1.5 transition-colors">
                        <i data-lucide="archive" class="w-4 h-4"></i> ZIP Vault
                    </button>
                    <div class="h-4 w-[1px] bg-slate-700"></div>
                    <button id="export-all-btn" class="text-xs font-bold text-slate-400 hover:text-white flex items-center gap-1.5 transition-colors">
                        <i data-lucide="copy" class="w-4 h-4"></i> Individual
                    </button>
                </div>
            </div>

            <div id="dashboard-list" class="flex-1 overflow-y-auto p-4 space-y-6">
                <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-700">
                    <div class="relative mb-4">
                        <i data-lucide="book-dashed" class="w-16 h-16 opacity-20"></i>
                        <i data-lucide="search" class="w-6 h-6 absolute bottom-0 right-0 text-indigo-500 animate-pulse"></i>
                    </div>
                    <p class="text-sm font-bold uppercase tracking-widest opacity-40">No records found</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        const AppState = { documents: [], totalProcessed: 0 };
        const DOM = {
            textarea: document.getElementById('intake-textarea'),
            processBtn: document.getElementById('process-btn'),
            uploadBtn: document.getElementById('upload-btn'),
            fileInput: document.getElementById('file-upload'),
            dashboardList: document.getElementById('dashboard-list'),
            emptyState: document.getElementById('empty-state'),
            docCount: document.getElementById('doc-count'),
            exportActions: document.getElementById('export-actions'),
            exportAllBtn: document.getElementById('export-all-btn'),
            exportZipBtn: document.getElementById('export-zip-btn')
        };

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            bindEvents();
        });

        function bindEvents() {
            DOM.processBtn.addEventListener('click', handleProcessBatch);
            DOM.exportAllBtn.addEventListener('click', handleExportAll);
            DOM.exportZipBtn.addEventListener('click', handleExportZip);
            DOM.uploadBtn.addEventListener('click', () => DOM.fileInput.click());
            DOM.fileInput.addEventListener('change', handleFileUpload);
        }

        function handleProcessBatch() {
            const rawText = DOM.textarea.value.trim();
            if (!rawText) return;

            const rawDocs = rawText.split(/\n\s*\/\/\/\/\s*\n/);
            const newDocs = rawDocs
                .map(doc => doc.trim())
                .filter(doc => doc.length > 0)
                .map(doc => transformEntity(doc));

            AppState.documents = [...AppState.documents, ...newDocs];
            AppState.totalProcessed = AppState.documents.length;
            DOM.textarea.value = '';
            updateDashboard();
        }

        async function handleFileUpload(event) {
            const files = event.target.files;
            if (!files.length) return;
            let combined = DOM.textarea.value.trim();
            for (const file of files) {
                const text = await file.text();
                if (combined.length > 0) combined += '\n\n////\n\n';
                combined += text.trim();
            }
            DOM.textarea.value = combined;
            DOM.fileInput.value = '';
        }

        function transformEntity(rawText) {
            const lines = rawText.split('\n');
            let title = "Unknown Entity";
            let foundTitle = false;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.length > 2 && !/^[^a-zA-Z0-9]+$/.test(line)) {
                    title = line.replace(/^#+\s*/, '').trim();
                    lines.splice(i, 1);
                    foundTitle = true;
                    break;
                }
            }

            const cleanTitle = title.replace(/[^\w\s-]/g, '').trim();
            const alias = cleanTitle.toLowerCase().replace(/\s+/g, '-');
            const tags = deriveContext(rawText);

            const meta = extractMetadata(rawText, tags.thematic);
            const systemBrief = `> [!abstract] System Brief
> **Type:** ${meta.type}
> **Tier:** ${meta.tier}
> **Role:** ${meta.role}
> **Location:** ${meta.location}`;

            const body = formatBody(lines);

            const voiceProfile = meta.type === 'NPC' ? generateVoiceProfile(rawText) : '';

            const lineage = `\n---\n**Lineage:** [[${meta.parent || 'Campaign Home'}]] > [[${meta.faction || 'Unaligned'}]]`;

            const markdown = `---
aliases: [${alias}]
tags: [OC, ${tags.thematic}]
type: document
entity_type: ${meta.type}
tier: ${meta.tier}
---

# ${title}
**Tags:** #OC

${systemBrief}

${voiceProfile}
${body}

${lineage}`;

            return { id: crypto.randomUUID(), title: title, markdown: markdown };
        }

        function deriveContext(text) {
            const low = text.toLowerCase();
            if (low.includes('armor class') || low.includes('hit points')) return { thematic: 'Bestiary', type: 'Creature' };
            if (low.includes('cast') || low.includes('spell')) return { thematic: 'Magic', type: 'Spell' };
            if (low.includes('village') || low.includes('city') || low.includes('region')) return { thematic: 'Location', type: 'Geography' };
            if (low.includes('weapon') || low.includes('item') || low.includes('loot')) return { thematic: 'Item', type: 'Object' };
            return { thematic: 'Lore', type: 'Concept' };
        }

        function extractMetadata(text, thematic) {
            const lines = text.split('\n');
            const data = {
                type: deriveContext(text).type,
                tier: 'Standard',
                role: 'Ambient',
                location: 'Unknown',
                parent: 'Master Ledger',
                faction: 'Unaligned'
            };

            text.split('\n').forEach(line => {
                const l = line.toLowerCase();
                if (l.includes('tier') && l.match(/\d/)) data.tier = line.split(':')[1]?.trim() || data.tier;
                if (l.includes('location:')) data.location = line.split(':')[1]?.trim() || data.location;
                if (l.includes('role:')) data.role = line.split(':')[1]?.trim() || data.role;
                if (l.includes('faction:')) data.faction = line.split(':')[1]?.trim() || data.faction;
                if (l.includes('part of:')) data.parent = line.split(':')[1]?.trim() || data.parent;
            });

            if (thematic === 'Bestiary') data.type = 'NPC';
            return data;
        }

        function generateVoiceProfile(text) {
            const profiles = [];
            const low = text.toLowerCase();
            if (low.includes('accent')) profiles.push(text.match(/.*accent.*/i)?.[0]);
            if (low.includes('voice')) profiles.push(text.match(/.*voice.*/i)?.[0]);
            if (low.includes('speaks')) profiles.push(text.match(/.*speaks.*/i)?.[0]);

            if (profiles.length === 0) return '';

            return `> [!quote] Voice Profile
> ${profiles.join('\n> ')}\n`;
        }

        function formatBody(lines) {
            let formatted = [];
            let inList = false;

            lines.forEach(line => {
                let l = line.trim();
                if (!l) {
                    formatted.push('');
                    inList = false;
                    return;
                }

                if (l.match(/!\[.*\]\(http.*\)/)) return;

                if (l.startsWith('**') && l.endsWith('**') && l.length < 50) {
                    formatted.push(`### ${applyWikilinks(l.replace(/\*/g, ''))}`);
                }
                else if (l === l.toUpperCase() && l.length > 4 && l.length < 40 && !l.match(/\d/)) {
                    formatted.push(`## ${applyWikilinks(l)}`);
                }
                else if (l.match(/^(\d+\.|-|\*|\+)\s/)) {
                    formatted.push(applyWikilinks(l));
                }
                else if (l.includes('|') && l.includes('---')) {
                    formatted.push(l);
                }
                else {
                    formatted.push(applyWikilinks(l));
                }
            });

            return formatted.join('\n');
        }

        function applyWikilinks(text) {
            const regex = /(^|\s)([A-Z][a-z]+(?:\s[A-Z][a-z]+){1,2})(?=[.,:;!?'"\s]|$)/g;
            return text.replace(regex, (match, p1, p2) => {
                const technicalSlug = p2.replace(/\s+/g, '-').toLowerCase();
                const isTechnical = technicalSlug.includes('v1') || technicalSlug.includes('id-');

                if (isTechnical) {
                    return `${p1}[[${technicalSlug}|${p2}]] #stub`;
                }
                return `${p1}[[${p2}|${p2}]]`;
            });
        }

        function updateDashboard() {
            DOM.docCount.textContent = AppState.totalProcessed;
            if (AppState.totalProcessed > 0) {
                DOM.emptyState.classList.add('hidden');
                DOM.exportActions.classList.remove('hidden');
            }
            DOM.dashboardList.innerHTML = '';
            [...AppState.documents].reverse().forEach(doc => {
                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-lg group hover:border-indigo-500/50 transition-all";
                card.innerHTML = `
                    <div class="px-4 py-3 bg-slate-800/50 flex justify-between items-center border-b border-slate-800">
                        <span class="text-xs font-bold text-slate-300 truncate max-w-[70%]">${doc.title}</span>
                        <button onclick="downloadDocument('${doc.id}')" class="text-slate-500 hover:text-indigo-400 p-1 transition-colors">
                            <i data-lucide="download" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div class="p-4 h-32 overflow-y-auto bg-slate-950/50">
                        <pre class="text-[10px] text-slate-500 font-mono whitespace-pre-wrap">${escapeHtml(doc.markdown)}</pre>
                    </div>
                `;
                DOM.dashboardList.appendChild(card);
            });
            lucide.createIcons();
        }

        window.downloadDocument = function(id) {
            const doc = AppState.documents.find(d => d.id === id);
            if (doc) triggerDownload(doc.markdown, `${doc.title}.md`);
        };

        async function handleExportZip() {
            const zip = new JSZip();
            AppState.documents.forEach(doc => {
                const safeName = doc.title.replace(/[^a-z0-9]/gi, '_');
                zip.file(`${safeName}.md`, doc.markdown);
            });
            const content = await zip.generateAsync({ type: "blob" });
            triggerDownload(content, "Vault_Batch_Export.zip");
        }

        function handleExportAll() {
            AppState.documents.forEach((doc, i) => setTimeout(() => downloadDocument(doc.id), i * 300));
        }

        function triggerDownload(content, filename) {
            const blob = content instanceof Blob ? content : new Blob([content], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
