<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7fd1b9" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7fd1b9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7fd1b9" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7fd1b9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#09111b"/>
  <rect width="512" height="512" rx="96" fill="url(#bg-glow)"/>

  <!-- D20 hexagonal outline -->
  <polygon
    points="256,64 422,160 422,352 256,448 90,352 90,160"
    fill="none"
    stroke="#7fd1b9"
    stroke-width="11"
    stroke-linejoin="round"
    opacity="0.92"
  />

  <!-- Face dividers: each vertex to center -->
  <line x1="256" y1="64"  x2="256" y2="256" stroke="#7fd1b9" stroke-width="5" opacity="0.38"/>
  <line x1="422" y1="160" x2="256" y2="256" stroke="#7fd1b9" stroke-width="5" opacity="0.38"/>
  <line x1="422" y1="352" x2="256" y2="256" stroke="#7fd1b9" stroke-width="5" opacity="0.38"/>
  <line x1="256" y1="448" x2="256" y2="256" stroke="#7fd1b9" stroke-width="5" opacity="0.38"/>
  <line x1="90"  y1="352" x2="256" y2="256" stroke="#7fd1b9" stroke-width="5" opacity="0.38"/>
  <line x1="90"  y1="160" x2="256" y2="256" stroke="#7fd1b9" stroke-width="5" opacity="0.38"/>

  <!-- Mid equator -->
  <line x1="90" y1="256" x2="422" y2="256" stroke="#7fd1b9" stroke-width="4" opacity="0.18"/>

  <!-- Vertex accent dots -->
  <circle cx="256" cy="64"  r="9" fill="#7fd1b9" opacity="0.75"/>
  <circle cx="422" cy="160" r="7" fill="#7fd1b9" opacity="0.52"/>
  <circle cx="422" cy="352" r="7" fill="#7fd1b9" opacity="0.52"/>
  <circle cx="256" cy="448" r="9" fill="#7fd1b9" opacity="0.75"/>
  <circle cx="90"  cy="352" r="7" fill="#7fd1b9" opacity="0.52"/>
  <circle cx="90"  cy="160" r="7" fill="#7fd1b9" opacity="0.52"/>

  <!-- Center glow halo -->
  <circle cx="256" cy="256" r="44" fill="url(#center-glow)"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="20" fill="#7fd1b9" opacity="0.88"/>
  <circle cx="256" cy="256" r="9"  fill="white"   opacity="0.92"/>
</svg>
